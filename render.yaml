databases:
  - name: eng-hub-db
    plan: free
    databaseName: enghub
    user: enghub_user

services:
  - type: web
    name: eng-hub
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eng-hub-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
